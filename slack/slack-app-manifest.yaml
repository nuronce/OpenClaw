_metadata:
  major_version: 1
display_information:
  name: OpenClaw
  description: OpenClaw assistant
  background_color: "#2c2d30"
features:
  bot_user:
    display_name: OpenClaw
    always_online: false
oauth_config:
  scopes:
    user:
      - identify
    bot:
      - search:read.mpim
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - im:write.topic
      - links:read
      - mpim:history
      - mpim:read
      - mpim:write
      - search:read.users
      - team:read
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_hosted: false
