name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq
          python3 -m pip install --upgrade pip
          python3 -m pip install cfn-lint yamllint

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

      - name: Lint YAML
        run: yamllint -c .yamllint aws deploy slack .github/workflows

      - name: Validate CloudFormation templates
        run: |
          cfn-lint aws/openclaw-foundation.yaml
          cfn-lint aws/network/openclaw-network.yaml
          cfn-lint aws/iam/openclaw-instance-role.yaml

      - name: Validate JSON files
        run: |
          jq empty aws/cloudwatch/amazon-cloudwatch-agent.json
          jq empty aws/iam/openclaw-s3-archive-policy.json
          if [ -f deploy/openclaw/mcp/mcpservers.json ]; then
            jq empty deploy/openclaw/mcp/mcpservers.json
          fi
